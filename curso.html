        // Verificar autenticación
        function checkAuth() {
            const email = localStorage.getItem('studentEmail');
            const code = localStorage.getItem('studentCode');
            
            if (!email || !code) {
                window.location.href = '../index.html';
                return false;
            }
            
            document.getElementById('user-name').textContent = localStorage.getItem('studentName') || 'Estudiante';
            document.getElementById('user-initials').textContent = (localStorage.getItem('studentName') || 'E')[0].toUpperCase();
            
            return true;
        }

        // Obtener parámetro de URL
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // Cargar curso
        function loadCourse() {
            const courseId = getUrlParameter('curso');
            
            if (!courseId || !COURSES_DATA[courseId]) {
                showAlert('error', 'Curso no encontrado');
                return;
            }
            
            const course = COURSES_DATA[courseId];
            
            // Actualizar header
            document.getElementById('course-title').textContent = course.title;
            document.getElementById('course-description').textContent = course.description;
            
            // Cargar progreso desde Google Sheets
            loadProgress(courseId, course.modules.length);
            
            // Renderizar módulos (sin numeración visible)
            renderModules(courseId, course.modules);
        }

        // Renderizar módulos
        function renderModules(courseId, modules) {
            const list = document.getElementById('modules-list');
            list.innerHTML = '';
            
            modules.forEach((module, index) => {
                const item = document.createElement('li');
                item.className = 'module-item';
                item.innerHTML = `
                    <h3>${module.title}</h3>
                    <p>${module.description}</p>
                `;
                
                item.addEventListener('click', () => {
                    // Navegar al módulo específico
                    window.location.href = `modulo.html?curso=${courseId}&modulo=${module.id}`;
                });
                
                list.appendChild(item);
            });
        }

        // Cargar progreso
        async function loadProgress(courseId, totalModules) {
            const email = localStorage.getItem('studentEmail');
            const studentCode = localStorage.getItem('studentCode');
            
            try {
                const response = await fetch(`${GAS_CONFIG.SCRIPT_URL}?action=getProgress&email=${encodeURIComponent(email)}&code=${encodeURIComponent(studentCode)}&curso=${courseId}`);
                const data = await response.json();
                
                if (data.success) {
                    const completedModules = data.completed || 0;
                    const percentage = Math.round((completedModules / totalModules) * 100);
                    
                    document.getElementById('progress-text').textContent = `${percentage}%`;
                    document.getElementById('progress-fill').style.width = `${percentage}%`;
                    
                    // Marcar módulos completados
                    markCompletedModules(data.completedModules || []);
                }
            } catch (error) {
                console.error('Error loading progress:', error);
            }
        }

        // Marcar módulos completados
        function markCompletedModules(completedIds) {
            const items = document.querySelectorAll('.module-item');
            items.forEach((item, index) => {
                if (completedIds.includes(index)) {
                    item.classList.add('completed');
                }
            });
        }

        // Mostrar alertas
        function showAlert(type, message) {
            const alertBox = document.getElementById('alert-course');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
        }

        // Cerrar sesión
        document.getElementById('logout-btn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../index.html';
        });

        // Inicializar
        window.addEventListener('DOMContentLoaded', function() {
            if (checkAuth()) {
                loadCourse();
            }
        });
