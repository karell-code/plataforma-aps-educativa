<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - APS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; padding: 2rem; }
        .header { display: flex; justify-content: space-between; margin-bottom: 2rem; border-bottom: 2px solid #667eea; padding-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #667eea; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn { padding: 5px 10px; cursor: pointer; border: none; border-radius: 3px; color: white; }
        .btn-grant { background-color: #4caf50; }
        .btn-revoke { background-color: #f44336; }
        .loading { text-align: center; font-style: italic; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Panel de Administración - KKK</h1>
        <button onclick="logout()" style="background:#666; color:white; border:none; padding:10px; cursor:pointer;">Cerrar Sesión</button>
    </div>

    <h2>Gestión de Matrículas</h2>
    <div id="loading" class="loading">Cargando datos de estudiantes...</div>
    
    <table id="adminTable" style="display:none;">
        <thead>
            <tr>
                <th>Estudiante</th>
                <th>Email</th>
                <th>Código</th>
                <th>Curso</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const GAS_CONFIG = {
            SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxkyiYtHqxxmsEDWStNy8UIP2bMR4KVGWXOBm5V7KfBnIvJMgx6LNmvDpx0Ai4Ek_CX/exec',
            SHEET_ID: '15OY4xZ9L8447vsUkeT3NwIdqw2_vmaGbFJQtUdIf4gU'
        };

        if (localStorage.getItem('userCodigo') !== 'EST-ADMIN') {
            alert('Acceso denegado');
            window.location.href = 'index.html';
        }

        async function loadData() {
            try {
                const res = await fetch(`${GAS_CONFIG.SCRIPT_URL}?action=getAllEnrollments`);
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('adminTable').style.display = 'table';
                
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';

                if (data.status === 'success' && data.data.length > 0) {
                    data.data.forEach(row => {
                        const tr = document.createElement('tr');
                        const isApproved = row.estado === 'Activo';
                        tr.innerHTML = `
                            <td>${row.nombre_estudiante || 'N/A'}</td>
                            <td>${row.email}</td>
                            <td>${row.codigo_estudiante}</td>
                            <td>${row.curso_id}</td>
                            <td style="color:${isApproved ? 'green' : 'red'}">${row.estado}</td>
                            <td>
                                <button class="btn ${isApproved ? 'btn-revoke' : 'btn-grant'}" 
                                    onclick="toggleStatus('${row.email}', '${row.codigo_estudiante}', '${row.curso_id}', ${!isApproved})">
                                    ${isApproved ? 'Desactivar' : 'Activar'}
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="6">No hay matrículas registradas</td></tr>';
                }
            } catch (e) {
                document.getElementById('loading').textContent = 'Error cargando datos: ' + e.message;
            }
        }

        async function toggleStatus(email, codigo, curso, activate) {
            if(!confirm(`¿${activate ? 'Activar' : 'Desactivar'} acceso a ${curso}?`)) return;
            
            const action = activate ? 'approveEnrollment' : 'revokeEnrollment';
            try {
                const res = await fetch(`${GAS_CONFIG.SCRIPT_URL}?action=${action}&email=${email}&codigo=${codigo}&curso=${curso}`);
                const data = await res.json();
                if(data.status === 'success') {
                    alert('Operación exitosa');
                    loadData();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch(e) { alert('Error de conexión'); }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        loadData();
    </script>
</body>
</html>
