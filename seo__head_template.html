<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Page Title</title>

    <!-- Dublin Core Metadata -->
    <meta name="DC.title" content="Your Page Title">
    <meta name="DC.creator" content="Author Name">
    <meta name="DC.description" content="A brief description of your webpage.">
    <meta name="DC.date" content="2026-03-27">

    <!-- Schema.org Metadata -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Your Page Title",
      "description": "A brief description of your webpage.",
      "author": {
        "@type": "Person",
        "name": "Author Name"
      },
      "datePublished": "2026-03-27"
    }
    </script>

    <!-- Google Scholar Metadata -->
    <meta name="citation_title" content="Your Page Title">
    <meta name="citation_author" content="Author Name">
    <meta name="citation_publication_date" content="2026-03-27">
    <meta name="citation_journal_title" content="Journal Name">
    <meta name="citation_volume" content="1">
    <meta name="citation_issue" content="1">
    <meta name="citation_page_range" content="1-10">

    <!-- Open Graph Metadata -->
    <meta property="og:title" content="Your Page Title">
    <meta property="og:description" content="A brief description of your webpage.">
    <meta property="og:image" content="URL_to_image">  
    <meta property="og:url" content="URL_to_your_page">

    <!-- Twitter Card Metadata -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Your Page Title">
    <meta name="twitter:description" content="A brief description of your webpage.">
    <meta name="twitter:image" content="URL_to_image">

</head>

</html>
