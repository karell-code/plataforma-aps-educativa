<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Académica APS - Login</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { color: #333; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .login-header p { color: #666; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 0.75rem; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        .btn-login:hover { background: #5a6fd6; }
        .error-msg { color: #e74c3c; text-align: center; margin-top: 1rem; display: none; }
        .loading { text-align: center; display: none; margin-top: 1rem; color: #666; }
        .author-info { margin-top: 2rem; text-align: center; font-size: 0.8rem; color: #888; border-top: 1px solid #eee; padding-top: 1rem; }
        .author-info a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Sistema de Gestión Académica APS</h1>
            <p>Institución: KKK</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>
            
            <div class="form-group">
                <label for="codigo">Código de Estudiante</label>
                <input type="text" id="codigo" required placeholder="Ej: EST-ADMIN">
            </div>
            
            <button type="submit" class="btn-login">Ingresar</button>
            
            <div id="errorMsg" class="error-msg"></div>
            <div id="loading" class="loading">Validando credenciales...</div>
        </form>

        <div class="author-info">
            <p><strong>Autor:</strong> Karell Rafael Vazquez Argote</p>
            <p><strong>ORCID:</strong> <a href="https://orcid.org/my-orcid?orcid=0000-0003-3860-5702" target="_blank">0000-0003-3860-5702</a></p>
            <p><strong>Email:</strong> karell0079@gmail.com</p>
            <p><strong>Colaboradores:</strong> SSSS</p>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const GAS_CONFIG = {
            SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxkyiYtHqxxmsEDWStNy8UIP2bMR4KVGWXOBm5V7KfBnIvJMgx6LNmvDpx0Ai4Ek_CX/exec',
            SHEET_ID: '15OY4xZ9L8447vsUkeT3NwIdqw2_vmaGbFJQtUdIf4gU'
        };

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const codigo = document.getElementById('codigo').value.trim().toUpperCase();
            const errorMsg = document.getElementById('errorMsg');
            const loading = document.getElementById('loading');
            
            errorMsg.style.display = 'none';
            loading.style.display = 'block';
            
            try {
                const response = await fetch(`${GAS_CONFIG.SCRIPT_URL}?action=login&email=${encodeURIComponent(email)}&codigo=${encodeURIComponent(codigo)}`, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userCodigo', codigo);
                    localStorage.setItem('userName', data.data.nombre);
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = data.message || 'Credenciales inválidas';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                errorMsg.textContent = 'Error de conexión. Verifica tu internet.';
                errorMsg.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
