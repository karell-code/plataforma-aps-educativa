<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - APS</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: #667eea; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .welcome { margin-bottom: 2rem; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
        .course-card { background: white; border-radius: 10px; padding: 1.5rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .course-card:hover { transform: translateY(-5px); }
        .course-card.locked { opacity: 0.6; background: #e0e0e0; cursor: not-allowed; }
        .course-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
        .course-title { font-weight: bold; margin-bottom: 0.5rem; color: #333; }
        .course-desc { font-size: 0.9rem; color: #666; }
        .lock-badge { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; }
        .logout-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 5px; }
        .admin-link { display: inline-block; margin-top: 2rem; color: #667eea; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h2>Panel de Estudiante</h2>
        <div>
            <span id="userName">Estudiante</span>
            <a href="#" onclick="logout()" class="logout-btn">Salir</a>
        </div>
    </header>

    <div class="container">
        <div class="welcome">
            <h1>Mis Cursos</h1>
            <p>Selecciona un curso para comenzar</p>
        </div>

        <div id="coursesGrid" class="courses-grid">
            <!-- Cursos cargados dinámicamente -->
            <p>Cargando cursos...</p>
        </div>

        <div style="text-align: center;">
            <a href="servicios.html" class="admin-link">Ver Servicios de Asesoramiento</a> | 
            <a href="sistema/colaboraciones.html" class="admin-link">Colaboraciones</a>
            <br>
            <a href="admin.html" id="adminLink" class="admin-link" style="display:none;">Ir al Panel Admin</a>
        </div>
    </div>

    <script>
        const GAS_CONFIG = {
            SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxkyiYtHqxxmsEDWStNy8UIP2bMR4KVGWXOBm5V7KfBnIvJMgx6LNmvDpx0Ai4Ek_CX/exec',
            SHEET_ID: '15OY4xZ9L8447vsUkeT3NwIdqw2_vmaGbFJQtUdIf4gU'
        };

        const userCodigo = localStorage.getItem('userCodigo');
        const userName = localStorage.getItem('userName');
        
        if (!userCodigo) window.location.href = 'index.html';
        document.getElementById('userName').textContent = userName || userCodigo;

        // Lista maestra de cursos (se podría obtener del sheet también)
        const ALL_COURSES = [
            { id: 'APS-101', title: 'Bioestadística Aplicada', icon: '📊', desc: 'Estadística para ciencias de la salud' },
            { id: 'APS-102', title: 'Epidemiología General', icon: '🦠', desc: 'Principios básicos de epidemiología' },
            { id: 'APS-103', title: 'Investigación Científica', icon: '🔬', desc: 'Metodología de la investigación' },
            { id: 'APS-104', title: 'Salud Pública', icon: '🏥', desc: 'Fundamentos de salud comunitaria' },
            { id: 'APS-105', title: 'Gestión Hospitalaria', icon: '📋', desc: 'Administración de servicios de salud' },
            { id: 'APS-106', title: 'Nutrición Clínica', icon: '🍎', desc: 'Nutrición aplicada a pacientes' },
            { id: 'APS-107', title: 'Farmacología Básica', icon: '💊', desc: 'Principios de farmacoterapia' },
            { id: 'APS-108', title: 'Ética Médica', icon: '⚖️', desc: 'Bioética y deontología profesional' }
        ];

        async function loadCourses() {
            const grid = document.getElementById('coursesGrid');
            try {
                const res = await fetch(`${GAS_CONFIG.SCRIPT_URL}?action=getEnrollments&codigo=${userCodigo}`);
                const data = await res.json();
                
                let enrolledIds = [];
                if (data.status === 'success') {
                    enrolledIds = data.data.map(m => m.curso_id);
                }

                grid.innerHTML = '';
                ALL_COURSES.forEach(course => {
                    const isEnrolled = enrolledIds.includes(course.id);
                    const card = document.createElement('div');
                    card.className = `course-card ${isEnrolled ? '' : 'locked'}`;
                    
                    let clickAction = '';
                    if (isEnrolled) {
                        clickAction = `window.location.href='curso.html?curso=${course.id}'`;
                    } else {
                        clickAction = `alert('No tienes acceso a este curso. Contacta al profesor Karell Vazquez para solicitar matrícula.')`;
                    }

                    card.onclick = () => eval(clickAction);

                    card.innerHTML = `
                        ${!isEnrolled ? '<span class="lock-badge">🔒 Bloqueado</span>' : ''}
                        <span class="course-icon">${course.icon}</span>
                        <div class="course-title">${course.title}</div>
                        <div class="course-desc">${course.desc}</div>
                    `;
                    grid.appendChild(card);
                });

                // Mostrar link admin si es admin
                if (userCodigo === 'EST-ADMIN') {
                    document.getElementById('adminLink').style.display = 'inline-block';
                }

            } catch (error) {
                console.error(error);
                grid.innerHTML = '<p>Error cargando cursos. Intente más tarde.</p>';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        loadCourses();
    </script>
</body>
</html>
